<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Democrata • Perguntas e Sugestões</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1624;
      --card:#101a2a;
      --line:#22314a;
      --text:#e6edf3;
      --muted:#9aa4b2;
      --primary:#2b74ff;
      --shadow: 0 18px 40px rgba(0,0,0,.38);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(43,116,255,.18), transparent 60%),
        linear-gradient(180deg, #070a0f, #0b0f14);
      min-height:100vh;
    }
    .wrap{max-width:1040px; margin:0 auto; padding:18px;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px;
      background:rgba(15,22,36,.75);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .logo{
      width:40px;height:40px;border-radius:14px;
      background:linear-gradient(135deg, rgba(43,116,255,.9), rgba(43,116,255,.2));
      display:grid;place-items:center;font-weight:800;
    }
    .title h1{font-size:15px;margin:0}
    .pill{
      font-size:12px;color:var(--muted);
      border:1px solid var(--line);
      padding:7px 10px;border-radius:999px;
    }
    .tabs{margin-top:14px;display:flex;gap:8px;}
    .tab{
      padding:10px 12px;border-radius:12px;
      border:1px solid var(--line);
      background:rgba(16,26,42,.45);
      cursor:pointer;font-weight:700;font-size:13px;
    }
    .tab.active{
      background:rgba(43,116,255,.16);
      border-color: rgba(43,116,255,.45);
    }
    .panel{
      margin-top:12px;
      background:rgba(15,22,36,.72);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
    }
    .card{
      background:rgba(16,26,42,.7);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
    input, textarea{
      width:100%;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(8,12,20,.55);
      color:var(--text);
      padding:12px;
      outline:none;
    }
    textarea{min-height:110px;resize:vertical}
    .btn{
      border:0;cursor:pointer;font-weight:700;
      padding:10px 12px;border-radius:12px;
      background:var(--primary);color:white;
    }
    .feed{display:grid;gap:10px;margin-top:12px;}
    .item{
      border:1px solid var(--line);
      background:rgba(8,12,20,.45);
      border-radius:16px;
      padding:14px;
    }
    .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
    .answer{
      margin-top:12px;padding:12px;border-radius:14px;
      border:1px dashed rgba(43,116,255,.6);
      background:rgba(43,116,255,.08);
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">D</div>
      <div class="title">
        <h1>Perguntas • Democrata</h1>
      </div>
    </div>
    <div class="pill" id="countPill">— registros</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="ask">Enviar</button>
    <button class="tab" data-tab="feed">Feed</button>
    <button class="tab" data-tab="admin">Admin</button>
  </div>

  <div class="panel">

    <div id="tab-ask">
      <div class="card">
        <label>E-mail (opcional)</label>
        <input id="email" type="email" />
        <label style="margin-top:10px;">Pergunta</label>
        <textarea id="question"></textarea>
        <button class="btn" id="sendBtn" style="margin-top:12px;">Enviar</button>
      </div>
    </div>

    <div id="tab-feed" style="display:none;">
      <div class="card">
        <div class="feed" id="feed"></div>
      </div>
    </div>

    <div id="tab-admin" style="display:none;">
      <div class="card">
        <label>E-mail da dona</label>
        <input id="adminEmail" type="email" />
        <label style="margin-top:10px;">Senha</label>
        <input id="adminPass" type="password" />
        <button class="btn" id="loginBtn" style="margin-top:12px;">Entrar</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* 🔹 SEU FIREBASECONFIG JÁ INSERIDO */
const firebaseConfig = {
  apiKey: "AIzaSyAAc_t3A2TrhAX8cvbq5IAwttCM-7ffIiM",
  authDomain: "oioi-6bf50.firebaseapp.com",
  projectId: "oioi-6bf50",
  storageBucket: "oioi-6bf50.firebasestorage.app",
  messagingSenderId: "447740165463",
  appId: "1:447740165463:web:7a737b320147009f0b1212",
  measurementId: "G-VWG8G3BX6Q"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const emailEl = document.getElementById("email");
const questionEl = document.getElementById("question");
const sendBtn = document.getElementById("sendBtn");
const feedEl = document.getElementById("feed");
const countPill = document.getElementById("countPill");

sendBtn.onclick = async () => {
  const question = questionEl.value.trim();
  if(!question) return alert("Digite a pergunta.");

  await addDoc(collection(db,"questions"),{
    question,
    email: emailEl.value.trim(),
    createdAt: serverTimestamp(),
    answer:"",
    answeredAt:null
  });

  questionEl.value="";
};

const q = query(collection(db,"questions"), orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{
  feedEl.innerHTML="";
  countPill.textContent = snap.size + " registros";
  snap.forEach(d=>{
    const data=d.data();
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <div class="meta">
        <span>${data.createdAt?.toDate().toLocaleString("pt-BR") || ""}</span>
      </div>
      <div style="margin-top:8px;">${data.question}</div>
      ${data.answer?`<div class="answer"><strong>Resposta:</strong><br>${data.answer}</div>`:""}
    `;
    feedEl.appendChild(div);
  });
});

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("adminEmail").value;
  const pass = document.getElementById("adminPass").value;
  await signInWithEmailAndPassword(auth,email,pass);
  alert("Logado com sucesso.");
};

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("tab-ask").style.display="none";
    document.getElementById("tab-feed").style.display="none";
    document.getElementById("tab-admin").style.display="none";
    document.getElementById("tab-"+tab.dataset.tab).style.display="";
  };
});
</script>

</body>
</html>
